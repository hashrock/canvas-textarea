<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Textarea</title>
    <style>
      body {
        background: #eee;
        margin: 0;
        display: flex;
        justify-content: center;
        padding-top: 40px;
      }
      .wrapper {
        position: relative;
      }
      canvas {
        background: white;
        display: block;
        touch-action: none;
      }
      textarea {
        position: absolute;
        opacity: 0;
        line-height: 20px;
        font-size: 13px;
        font-family: monospace;
        height: 1rem;
        border: none;
        outline: none;
        overflow: auto;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <canvas id="canv" width="400" height="300"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
